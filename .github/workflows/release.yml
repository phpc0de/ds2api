name: Release amd64 to GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.x"
  NODE_VERSION: "24"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n1 || true)"
          if [ -z "${latest_tag}" ]; then
            base="0.1.0"
          else
            base="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<< "${base}"
          major="${major:-0}"
          minor="${minor:-1}"
          patch="${patch:-0}"
          next_patch="$((patch + 1))"

          new_version="${major}.${minor}.${next_patch}"
          new_tag="v${new_version}"

          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Update VERSION
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.version.outputs.new_version }}" > VERSION

      - name: Build WebUI
        shell: bash
        run: |
          set -euo pipefail
          npm ci --prefix webui --prefer-offline --no-audit
          npm run build --prefix webui

      - name: Build linux amd64 archive only
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.new_tag }}
          BUILD_VERSION: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          ./scripts/build-release-archives.sh

      - name: Generate checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          (cd dist && sha256sum "ds2api_${TAG}_linux_amd64.tar.gz" > sha256sums.txt)

      - name: Prepare Docker dist input
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          mkdir -p dist/docker-input
          cp "dist/ds2api_${TAG}_linux_amd64.tar.gz" "dist/docker-input/linux_amd64.tar.gz"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime-from-dist
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new_tag }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit VERSION and create tag
        shell: bash
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${NEW_TAG} [skip ci]"
          fi

          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin HEAD:${GITHUB_REF_NAME} "${NEW_TAG}"

      - name: Create GitHub release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          gh release create "${NEW_TAG}" \
            "dist/ds2api_${NEW_TAG}_linux_amd64.tar.gz" \
            "dist/sha256sums.txt" \
            --title "${NEW_TAG}" \
            --notes "Automated release ${NEW_TAG}"
